<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>光影建築+</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; background:#0D1117; overflow:hidden;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; color:#E8E8E8; }

    /* ── Canvas ── */
    #c { position:fixed; inset:0; width:100%; height:100%; display:block; touch-action:none; }

    /* ── Panel ── */
    #panel {
      position:fixed; z-index:10;
      background:rgba(13,17,23,0.88); backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      border:1px solid rgba(106,138,106,0.25);
      overflow-y:auto; overflow-x:hidden;
      transition: transform 0.3s ease;
    }

    /* Desktop: right sidebar */
    @media (min-width: 600px) {
      #panel {
        top:0; right:0; bottom:0; width:300px;
        border-radius:0; border-right:none; border-top:none; border-bottom:none;
        border-left:1px solid rgba(106,138,106,0.25);
      }
      #panel.collapsed { transform: translateX(300px); }
      #toggle-btn { right:310px; top:50%; transform:translateY(-50%); border-radius:8px 0 0 8px; }
      #toggle-btn.collapsed { right:10px; }
    }

    /* Mobile: bottom sheet */
    @media (max-width: 599px) {
      #panel {
        left:0; right:0; bottom:0; height:44%;
        border-radius:16px 16px 0 0; border-bottom:none;
      }
      #panel.collapsed { transform: translateY(calc(100% - 44px)); }
      #toggle-btn { left:50%; transform:translateX(-50%); top:auto; bottom:calc(44% + 6px); border-radius:8px; }
      #toggle-btn.collapsed { bottom:50px; }
    }

    /* ── Toggle button ── */
    #toggle-btn {
      position:fixed; z-index:20;
      background:rgba(13,17,23,0.9); border:1px solid rgba(106,138,106,0.4);
      color:#6A8A6A; padding:8px 10px; cursor:pointer; font-size:16px;
      transition: bottom 0.3s, right 0.3s;
    }

    /* ── Panel header ── */
    .panel-header {
      display:flex; align-items:center; gap:8px; padding:14px 16px 10px;
      border-bottom:1px solid rgba(106,138,106,0.2);
      position:sticky; top:0; background:rgba(13,17,23,0.95); z-index:1;
    }
    .panel-header .icon { font-size:20px; }
    .panel-header .title { font-size:15px; font-weight:700; color:#A0C4A0; letter-spacing:0.5px; flex:1; }
    .header-btn { background:none; border:1px solid rgba(106,138,106,0.3); color:#9AB89A; border-radius:6px; padding:4px 8px; cursor:pointer; font-size:14px; transition:all 0.15s; }
    .header-btn:hover { background:rgba(106,138,106,0.2); }
    .play-btn { background:none; border:1px solid rgba(106,138,106,0.3); color:#9AB89A; border-radius:6px; width:28px; height:28px; cursor:pointer; font-size:13px; display:flex; align-items:center; justify-content:center; transition:all 0.15s; flex-shrink:0; }
    .play-btn:hover { background:rgba(106,138,106,0.2); }
    .play-btn.active { background:rgba(106,138,106,0.3); border-color:#6A8A6A; color:#C8E8C8; }

    /* ── Section ── */
    .section { padding:12px 16px; border-bottom:1px solid rgba(255,255,255,0.06); }
    .section-label {
      font-size:10px; letter-spacing:1.5px; color:#6A8A6A; text-transform:uppercase;
      margin-bottom:8px; font-weight:600;
    }

    /* ── Preset buttons ── */
    .preset-row { display:flex; gap:6px; }
    .preset-btn {
      flex:1; padding:8px 4px; border:1px solid rgba(106,138,106,0.3);
      background:rgba(106,138,106,0.08); color:#B0C8B0; border-radius:8px;
      cursor:pointer; font-size:11px; text-align:center; transition:all 0.15s;
    }
    .preset-btn:hover { background:rgba(106,138,106,0.2); }
    .preset-btn.active { background:rgba(106,138,106,0.3); border-color:#6A8A6A; color:#C8E8C8; }
    .preset-btn .pb-icon { font-size:18px; display:block; margin-bottom:3px; }

    /* ── City chips ── */
    .city-scroll { display:flex; gap:5px; overflow-x:auto; padding-bottom:4px; }
    .city-scroll::-webkit-scrollbar { height:3px; }
    .city-scroll::-webkit-scrollbar-track { background:transparent; }
    .city-scroll::-webkit-scrollbar-thumb { background:rgba(106,138,106,0.3); border-radius:2px; }
    .city-chip {
      flex-shrink:0; padding:5px 10px; border:1px solid rgba(106,138,106,0.3);
      background:rgba(106,138,106,0.08); color:#9AB89A; border-radius:20px;
      cursor:pointer; font-size:11px; white-space:nowrap; transition:all 0.15s;
    }
    .city-chip:hover { background:rgba(106,138,106,0.2); }
    .city-chip.active { background:rgba(106,138,106,0.3); border-color:#6A8A6A; color:#C8E8C8; }
    .city-lat { font-size:9px; opacity:0.7; }

    /* ── Season buttons ── */
    .season-row { display:flex; gap:5px; }
    .season-btn {
      flex:1; padding:6px 2px; border:1px solid rgba(106,138,106,0.3);
      background:rgba(106,138,106,0.08); color:#9AB89A; border-radius:6px;
      cursor:pointer; font-size:11px; text-align:center; transition:all 0.15s;
    }
    .season-btn:hover { background:rgba(106,138,106,0.2); }
    .season-btn.active { background:rgba(106,138,106,0.25); border-color:#6A8A6A; color:#C8E8C8; }

    /* ── Slider ── */
    .slider-row { display:flex; align-items:center; gap:10px; margin-top:4px; }
    .slider-label { font-size:12px; color:#9AB89A; min-width:30px; text-align:right; }
    .slider-val { font-size:12px; color:#C8E8C8; min-width:36px; font-weight:600; }
    input[type=range] {
      flex:1; -webkit-appearance:none; height:4px;
      background:rgba(106,138,106,0.25); border-radius:2px; outline:none; cursor:pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance:none; width:16px; height:16px; border-radius:50%;
      background:#6A8A6A; border:2px solid #C8E8C8; cursor:pointer;
    }
    input[type=range]::-moz-range-thumb {
      width:16px; height:16px; border-radius:50%;
      background:#6A8A6A; border:2px solid #C8E8C8; cursor:pointer; border:none;
    }

    /* ── Orientation ── */
    .orient-row { display:flex; gap:5px; }
    .orient-btn {
      flex:1; padding:7px 2px; border:1px solid rgba(106,138,106,0.3);
      background:rgba(106,138,106,0.08); color:#9AB89A; border-radius:6px;
      cursor:pointer; font-size:12px; text-align:center; transition:all 0.15s;
    }
    .orient-btn:hover { background:rgba(106,138,106,0.2); }
    .orient-btn.active { background:rgba(106,138,106,0.3); border-color:#6A8A6A; color:#C8E8C8; }

    /* ── Info panel ── */
    .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
    .info-item {
      background:rgba(106,138,106,0.08); border:1px solid rgba(106,138,106,0.15);
      border-radius:8px; padding:8px 10px;
    }
    .info-item .lbl { font-size:9px; color:#6A8A6A; letter-spacing:1px; text-transform:uppercase; }
    .info-item .val { font-size:16px; font-weight:700; color:#C8E8C8; margin-top:2px; }
    .info-item .unit { font-size:10px; color:#8AB08A; }

    /* ── Footer ── */
    .panel-footer {
      padding:10px 16px 16px; text-align:center;
      font-size:11px; color:rgba(180,210,180,0.88);
      line-height:1.6;
    }

    /* ── Compass ── */
    #compass {
      position:fixed; z-index:20; pointer-events:none;
      width:70px; height:70px;
    }
    @media (min-width: 600px) {
      #compass { left:16px; bottom:16px; }
    }
    @media (max-width: 599px) {
      #compass { left:12px; bottom:calc(44% + 12px); }
      #compass.panel-collapsed { bottom:58px; }
    }

    /* ── Loading overlay ── */
    #loading {
      position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
      background:#0D1117; flex-direction:column; gap:12px; z-index:100;
      color:#6A8A6A; font-size:14px;
    }
    #loading .spin { font-size:40px; animation: spin 2s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="loading">
  <div class="spin">🏙</div>
  <div>載入場景中...</div>
</div>

<canvas id="c"></canvas>

<button id="toggle-btn" onclick="togglePanel()" title="展開/收起控制面板">☰</button>

<div id="panel">
  <div class="panel-header">
    <span class="icon">🌞</span>
    <span class="title">光影建築+</span>
    <button class="header-btn" onclick="screenshot()" title="截圖">📷</button>
  </div>

  <!-- 場景 -->
  <div class="section">
    <div class="section-label">場景</div>
    <div class="preset-row">
      <button class="preset-btn active" id="btn-taipei101" onclick="setPreset('taipei101')">
        <span class="pb-icon">🏙</span>台北101
      </button>
      <button class="preset-btn" id="btn-ntust" onclick="setPreset('ntust')">
        <span class="pb-icon">🎓</span>台科大
      </button>
      <button class="preset-btn" id="btn-indoor" onclick="setPreset('indoor')">
        <span class="pb-icon">🏠</span>室內採光
      </button>
      <button class="preset-btn" id="btn-custom" onclick="setPreset('custom')">
        <span class="pb-icon">🔨</span>自建
      </button>
    </div>
  </div>

  <!-- 室內朝向 -->
  <div class="section" id="orient-section" style="display:none">
    <div class="section-label">窗戶朝向</div>
    <div class="orient-row">
      <button class="orient-btn active" id="o-south" onclick="setOrientation('south')">南向</button>
      <button class="orient-btn" id="o-east"  onclick="setOrientation('east')">東向</button>
      <button class="orient-btn" id="o-west"  onclick="setOrientation('west')">西向</button>
      <button class="orient-btn" id="o-north" onclick="setOrientation('north')">北向</button>
    </div>
  </div>

  <!-- 城市 -->
  <div class="section">
    <div class="section-label">城市</div>
    <div class="city-scroll" id="city-row"></div>
  </div>

  <!-- 節氣 -->
  <div class="section">
    <div class="section-label">節氣</div>
    <div class="season-row">
      <button class="season-btn" onclick="setSeason(12,21)">冬至</button>
      <button class="season-btn" onclick="setSeason(3,20)">春分</button>
      <button class="season-btn" onclick="setSeason(6,21)">夏至</button>
      <button class="season-btn" onclick="setSeason(9,23)">秋分</button>
    </div>
  </div>

  <!-- 時間 -->
  <div class="section">
    <div class="section-label">時間</div>
    <div class="slider-row">
      <span class="slider-label">時</span>
      <input type="range" id="hour-slider" min="5" max="19" step="0.25" value="12"
        oninput="onHourChange(this.value)">
      <span class="slider-val" id="hour-val">12:00</span>
      <button class="play-btn" id="play-btn" onclick="togglePlay()" title="自動播放">▶</button>
    </div>
  </div>

  <!-- 月份 / 日期 -->
  <div class="section">
    <div class="section-label">日期</div>
    <div class="slider-row">
      <span class="slider-label">月</span>
      <input type="range" id="month-slider" min="1" max="12" step="1" value="6"
        oninput="onMonthChange(this.value)">
      <span class="slider-val" id="month-val">6月</span>
    </div>
    <div class="slider-row" style="margin-top:6px">
      <span class="slider-label">日</span>
      <input type="range" id="day-slider" min="1" max="31" step="1" value="15"
        oninput="onDayChange(this.value)">
      <span class="slider-val" id="day-val">15日</span>
    </div>
  </div>

  <!-- 自訂建築 -->
  <div class="section" id="custom-section" style="display:none">
    <div class="section-label">自訂建築</div>
    <div style="display:flex;gap:6px;margin-bottom:8px">
      <button class="season-btn" onclick="addCustomBuilding()" style="flex:1">＋ 新增建築</button>
      <button class="season-btn" onclick="runSunlightAnalysis()" style="flex:1" id="analysis-btn">☀️ 日照分析</button>
      <button class="season-btn" onclick="clearSunlightAnalysis()" style="flex:0.5">清除</button>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap" id="building-chips"></div>
    <div id="building-editor" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span id="editor-title" style="font-size:12px;color:#C8E8C8;font-weight:600"></span>
        <div style="display:flex;gap:4px">
          <button class="season-btn" onclick="toggleBuildingTransparency()" style="padding:4px 8px;font-size:10px">👻 透明</button>
          <button class="season-btn" onclick="deleteCustomBuilding()" style="padding:4px 8px;font-size:10px;border-color:#4A2020;color:#FF6B6B">🗑 刪除</button>
        </div>
      </div>
      <div id="editor-sliders"></div>
    </div>
    <div id="spacing-info" style="display:none;margin-top:6px;font-size:11px;color:#4FC3F7"></div>
    <div id="analysis-result" style="display:none;margin-top:6px;font-size:11px;color:#81C784"></div>
    <div style="display:flex;gap:6px;margin-top:8px">
      <button class="season-btn" onclick="saveCustomBuildings()" style="flex:1">💾 儲存</button>
      <button class="season-btn" onclick="loadCustomBuildings()" style="flex:1">📂 讀取</button>
    </div>
  </div>

  <!-- 資訊 -->
  <div class="section">
    <div class="section-label">即時資訊</div>
    <div class="info-grid">
      <div class="info-item">
        <div class="lbl">高度角</div>
        <div class="val" id="info-alt">—</div>
        <div class="unit">度</div>
      </div>
      <div class="info-item">
        <div class="lbl">方位角</div>
        <div class="val" id="info-az">—</div>
        <div class="unit">度 <span id="info-dir"></span></div>
      </div>
      <div class="info-item">
        <div class="lbl" id="shadow-lbl">陰影長度</div>
        <div class="val" id="info-shadow">—</div>
        <div class="unit">公尺</div>
      </div>
      <div class="info-item">
        <div class="lbl">日出 / 日落</div>
        <div class="val" style="font-size:12px" id="info-riseset">— / —</div>
        <div class="unit"></div>
      </div>
    </div>
  </div>

  <div class="panel-footer">
    光影建築+ · 陳柏安 · 2026<br>
    Three.js · React Native · Expo
  </div>
</div>

<!-- Compass rose overlay -->
<div id="compass">
  <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
    <circle cx="40" cy="40" r="38" fill="rgba(13,17,23,0.78)" stroke="rgba(106,138,106,0.4)" stroke-width="1.5"/>
    <g id="compass-rose">
      <!-- tick marks -->
      <line x1="40" y1="4"  x2="40" y2="10" stroke="rgba(200,200,200,0.4)" stroke-width="1"/>
      <line x1="40" y1="70" x2="40" y2="76" stroke="rgba(200,200,200,0.4)" stroke-width="1"/>
      <line x1="4"  y1="40" x2="10" y2="40" stroke="rgba(200,200,200,0.4)" stroke-width="1"/>
      <line x1="70" y1="40" x2="76" y2="40" stroke="rgba(200,200,200,0.4)" stroke-width="1"/>
      <!-- N arrow (red) -->
      <polygon points="40,8 36.5,38 43.5,38" fill="#E04040"/>
      <!-- S arrow (grey) -->
      <polygon points="40,72 36.5,42 43.5,42" fill="rgba(160,160,160,0.65)"/>
      <!-- Center dot -->
      <circle cx="40" cy="40" r="3.5" fill="#D0D8D0"/>
      <!-- Cardinal labels -->
      <text x="40" y="21" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="white" font-weight="bold" font-family="sans-serif">N</text>
      <text x="40" y="61" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="rgba(200,200,200,0.75)" font-family="sans-serif">S</text>
      <text x="62" y="40" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="rgba(200,200,200,0.75)" font-family="sans-serif">E</text>
      <text x="18" y="40" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="rgba(200,200,200,0.75)" font-family="sans-serif">W</text>
    </g>
  </svg>
</div>

<script src="https://unpkg.com/three@0.150.0/build/three.min.js"></script>
<script>
(function () {
'use strict';

// ════════════════════════════════════════════════════════
// 1. 太陽計算
// ════════════════════════════════════════════════════════
const CITIES = [
  { key:'taipei',    name:'台北',     lat: 25.04,  group:'TW'  },
  { key:'taichung',  name:'台中',     lat: 24.15,  group:'TW'  },
  { key:'tainan',    name:'台南',     lat: 22.99,  group:'TW'  },
  { key:'kaohsiung', name:'高雄',     lat: 22.63,  group:'TW'  },
  { key:'hualien',   name:'花蓮',     lat: 23.97,  group:'TW'  },
  { key:'singapore', name:'新加坡',   lat:  1.35,  group:'INT' },
  { key:'bangkok',   name:'曼谷',     lat: 13.75,  group:'INT' },
  { key:'tokyo',     name:'東京',     lat: 35.68,  group:'INT' },
  { key:'london',    name:'倫敦',     lat: 51.51,  group:'INT' },
  { key:'helsinki',  name:'赫爾辛基', lat: 60.17,  group:'INT' },
  { key:'sydney',    name:'雪梨',     lat:-33.87,  group:'INT' },
];

function dayOfYear(month, day) {
  const d = [0,31,28,31,30,31,30,31,31,30,31,30,31];
  let n = day;
  for (let i = 1; i < month; i++) n += d[i];
  return n;
}

function calcSun(hour, month, day, lat) {
  const DEG = Math.PI / 180;
  const N = dayOfYear(month, day);
  const dec = 23.45 * Math.sin(DEG * (360 / 365) * (284 + N));
  const ha = (hour - 12) * 15;
  const sinAlt = Math.sin(DEG*lat)*Math.sin(DEG*dec) + Math.cos(DEG*lat)*Math.cos(DEG*dec)*Math.cos(DEG*ha);
  const alt = Math.asin(Math.max(-1, Math.min(1, sinAlt))) / DEG;
  const cosAlt = Math.cos(DEG * alt);
  let az = 180;
  if (cosAlt > 0.0001) {
    const cosAzS = (Math.sin(DEG*dec) - Math.sin(DEG*lat)*sinAlt) / (Math.cos(DEG*lat)*cosAlt);
    const azFS = Math.acos(Math.max(-1, Math.min(1, cosAzS))) / DEG;
    az = ha > 0 ? 360 - azFS : azFS;
    az = ((az % 360) + 360) % 360;
  }
  const cosHA0 = -(Math.tan(DEG*lat) * Math.tan(DEG*dec));
  let sunrise = 6, sunset = 18;
  if (Math.abs(cosHA0) <= 1) {
    const ha0 = Math.acos(cosHA0) / DEG;
    sunrise = 12 - ha0 / 15;
    sunset  = 12 + ha0 / 15;
  }
  const dirs = ['北','東北','東','東南','南','西南','西','西北','北'];
  return { alt, az, sunrise, sunset, dir: dirs[Math.round(az/45)] };
}

function fmt(h) {
  const hh = Math.floor(h), mm = Math.round((h - hh) * 60);
  return `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
}

// ════════════════════════════════════════════════════════
// 2. Three.js 場景
// ════════════════════════════════════════════════════════
const DEG = Math.PI / 180;
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, preserveDrawingBuffer: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0xA8C4DC, 0.007);

// Sky gradient sphere
const skyGeo = new THREE.SphereGeometry(350, 32, 16);
const skyMat = new THREE.ShaderMaterial({
  uniforms: {
    topColor: { value: new THREE.Color(0x0077ff) },
    bottomColor: { value: new THREE.Color(0xC8DCF0) },
    offset: { value: 20 },
    exponent: { value: 0.6 }
  },
  vertexShader: `varying vec3 vWorldPosition;
    void main() {
      vec4 worldPos = modelMatrix * vec4(position, 1.0);
      vWorldPosition = worldPos.xyz;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }`,
  fragmentShader: `uniform vec3 topColor;
    uniform vec3 bottomColor;
    uniform float offset;
    uniform float exponent;
    varying vec3 vWorldPosition;
    void main() {
      float h = normalize(vWorldPosition + offset).y;
      gl_FragColor = vec4(mix(bottomColor, topColor, max(pow(max(h, 0.0), exponent), 0.0)), 1.0);
    }`,
  side: THREE.BackSide
});
const skyMesh = new THREE.Mesh(skyGeo, skyMat);
scene.add(skyMesh);

const camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.5, 800);
let camTheta = DEG * 40, camPhi = DEG * 55, camRadius = 65;
let camTarget = new THREE.Vector3(0, 8, 0);

function updateCamera() {
  camera.position.set(
    camTarget.x + camRadius * Math.sin(camPhi) * Math.sin(camTheta),
    camTarget.y + camRadius * Math.cos(camPhi),
    camTarget.z + camRadius * Math.sin(camPhi) * Math.cos(camTheta)
  );
  camera.lookAt(camTarget);
  const rose = document.getElementById('compass-rose');
  if (rose) rose.setAttribute('transform',
    `rotate(${(-camTheta * 180 / Math.PI).toFixed(1)}, 40, 40)`);
}
updateCamera();

// Touch / Mouse orbit
let drag = null;
canvas.addEventListener('mousedown', e => { drag = { x: e.clientX, y: e.clientY, btn: e.button }; });
canvas.addEventListener('mousemove', e => {
  if (!drag) return;
  const dx = e.clientX - drag.x, dy = e.clientY - drag.y;
  if (drag.btn === 2) {
    // 右鍵平移
    const speed = camRadius * 0.0015;
    const right = new THREE.Vector3(Math.cos(camTheta), 0, -Math.sin(camTheta));
    const forward = new THREE.Vector3(-Math.sin(camTheta), 0, -Math.cos(camTheta));
    camTarget.addScaledVector(right, -dx * speed);
    camTarget.addScaledVector(forward, dy * speed);
  } else {
    // 左鍵旋轉
    camTheta -= dx * 0.007;
    camPhi = Math.max(0.10, Math.min(1.48, camPhi + dy * 0.007));
  }
  drag = { x: e.clientX, y: e.clientY, btn: drag.btn };
  updateCamera();
});
canvas.addEventListener('mouseup', () => drag = null);
canvas.addEventListener('mouseleave', () => drag = null);
canvas.addEventListener('contextmenu', e => e.preventDefault());

// Mouse wheel zoom
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const minR = currentPreset === 'indoor' ? 4 : 15;
  const maxR = currentPreset === 'indoor' ? 20 : (currentPreset === 'ntust' ? 500 : (currentPreset === 'custom' ? 300 : 120));
  camRadius = Math.max(minR, Math.min(maxR, camRadius * (1 + e.deltaY * 0.001)));
  updateCamera();
}, { passive: false });

// Touch: single-finger orbit + two-finger pinch zoom
let pinchDist = null, pinchMid = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    drag = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    pinchDist = null; pinchMid = null;
  } else if (e.touches.length === 2) {
    drag = null;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    pinchDist = Math.hypot(dx, dy);
    pinchMid = {
      x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
      y: (e.touches[0].clientY + e.touches[1].clientY) / 2
    };
  }
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && drag) {
    const dx = e.touches[0].clientX - drag.x, dy = e.touches[0].clientY - drag.y;
    camTheta -= dx * 0.007;
    camPhi = Math.max(0.10, Math.min(1.48, camPhi + dy * 0.007));
    drag = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    updateCamera();
  } else if (e.touches.length === 2 && pinchDist !== null) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const newDist = Math.hypot(dx, dy);
    const newMid = {
      x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
      y: (e.touches[0].clientY + e.touches[1].clientY) / 2
    };

    // 縮放
    const minR = currentPreset === 'indoor' ? 4 : 15;
    const maxR = currentPreset === 'indoor' ? 20 : (currentPreset === 'custom' ? 300 : (currentPreset === 'ntust' ? 500 : 120));
    camRadius = Math.max(minR, Math.min(maxR, camRadius * (pinchDist / newDist)));

    // 平移：中點移動 → 移動 camTarget
    if (pinchMid) {
      const mdx = newMid.x - pinchMid.x;
      const mdy = newMid.y - pinchMid.y;
      const speed = camRadius * 0.0015;
      // 相機的右方向（水平）和上方向（水平面）
      const right = new THREE.Vector3(Math.cos(camTheta), 0, -Math.sin(camTheta));
      const forward = new THREE.Vector3(-Math.sin(camTheta), 0, -Math.cos(camTheta));
      camTarget.addScaledVector(right, -mdx * speed);
      camTarget.addScaledVector(forward, mdy * speed);
    }

    pinchDist = newDist;
    pinchMid = newMid;
    updateCamera();
  }
}, { passive: false });
canvas.addEventListener('touchend', e => {
  if (e.touches.length === 0) { drag = null; pinchDist = null; pinchMid = null; }
  else if (e.touches.length === 1) {
    drag = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    pinchDist = null; pinchMid = null;
  }
});

// Helpers
function sunDir(az, alt) {
  return { x: Math.sin(az)*Math.cos(alt), y: Math.sin(alt), z: -Math.cos(az)*Math.cos(alt) };
}
function addBox(parent, x, y, z, w, h, d, mat, shadow=true) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  m.position.set(x, y, z);
  if (shadow) { m.castShadow = true; m.receiveShadow = true; }
  parent.add(m); return m;
}
function addCylinder(parent, x, y, z, rt, rb, h, seg, mat) {
  const m = new THREE.Mesh(new THREE.CylinderGeometry(rt, rb, h, seg), mat);
  m.position.set(x, y, z); m.castShadow = true; parent.add(m); return m;
}
function textLabel(text, w, h) {
  const cv = document.createElement('canvas'); cv.width = 256; cv.height = 64;
  const ctx = cv.getContext('2d');
  ctx.font = 'bold 26px sans-serif'; ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text, 128, 32);
  return new THREE.Mesh(new THREE.PlaneGeometry(w, h),
    new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(cv), transparent: true, depthWrite: false }));
}
function compassLabel(text, x, z, rotZ) {
  const cv = document.createElement('canvas'); cv.width = 128; cv.height = 64;
  const ctx = cv.getContext('2d');
  ctx.font = 'bold 30px sans-serif'; ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(text, 64, 32);
  const m = new THREE.Mesh(new THREE.PlaneGeometry(3.0, 1.5),
    new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(cv), transparent: true, depthWrite: false }));
  m.rotation.x = -Math.PI / 2; m.rotation.z = rotZ || 0;
  m.position.set(x, 0.05, z); return m;
}
function addTree(parent, x, z) {
  const matT = new THREE.MeshLambertMaterial({ color: 0x7A5828 });
  const matL1 = new THREE.MeshLambertMaterial({ color: 0x3A6820 });
  const matL2 = new THREE.MeshLambertMaterial({ color: 0x285018 });
  const th = 1.0 + Math.random() * 0.6;
  addCylinder(parent, x, th/2, z, 0.11, 0.17, th, 6, matT);
  const ch = 1.6 + Math.random() * 0.5;
  const c1 = new THREE.Mesh(new THREE.ConeGeometry(0.85, ch, 7), matL1);
  c1.position.set(x, th + ch*0.5, z); c1.castShadow = true; parent.add(c1);
  const c2 = new THREE.Mesh(new THREE.ConeGeometry(0.6, ch*0.65, 7), matL2);
  c2.position.set(x, th + ch*0.85, z); c2.castShadow = true; parent.add(c2);
}
function addWindowBand(parent, bx, bz, bw, bd, y, mat) {
  [[0,bd/2+0.02,0],[0,-bd/2-0.02,Math.PI],[bw/2+0.02,0,Math.PI/2],[-bw/2-0.02,0,-Math.PI/2]].forEach(([ox,oz,ry]) => {
    const ww = oz !== 0 ? bw*0.72 : bd*0.72;
    const wm = new THREE.Mesh(new THREE.PlaneGeometry(ww, 0.7), mat);
    wm.position.set(bx+ox, y, bz+oz); wm.rotation.y = ry; parent.add(wm);
  });
}

function setCustomBuildings(buildings) {
  // Remove old building groups
  Object.keys(customBuildingMeshes).forEach(id => {
    const grp = customBuildingMeshes[id];
    if (grp) groupCustom.remove(grp);
  });
  customBuildingMeshes = {};

  buildings.forEach((b, idx) => {
    const bg = new THREE.Group();
    const color = customBuildingColors[idx % customBuildingColors.length];
    const matBody = new THREE.MeshLambertMaterial({color:color});
    const matRoof = new THREE.MeshLambertMaterial({color:0x7A7870});
    const matWin = new THREE.MeshLambertMaterial({color:0x4868A0, transparent:true, opacity:0.75});
    const matAnno = new THREE.LineBasicMaterial({color:0xFF6644, transparent:true, opacity:0.8});

    // Body
    const body = new THREE.Mesh(new THREE.BoxGeometry(b.w, b.h, b.d), matBody);
    body.position.set(0, b.h/2, 0);
    body.castShadow = true; body.receiveShadow = true;
    body.userData.buildingId = b.id;
    bg.add(body);

    // Roof
    const roof = new THREE.Mesh(new THREE.BoxGeometry(b.w+0.5, 0.3, b.d+0.5), matRoof);
    roof.position.set(0, b.h+0.15, 0);
    roof.castShadow = true;
    bg.add(roof);

    // Window bands
    const floors = Math.max(1, Math.floor(b.h / 3));
    for (let f = 1; f <= floors; f++) {
      const wy = (f / (floors+1)) * b.h;
      // Front and back
      [b.d/2+0.02, -b.d/2-0.02].forEach(oz => {
        const wm = new THREE.Mesh(new THREE.PlaneGeometry(b.w*0.72, 0.7), matWin);
        wm.position.set(0, wy, oz);
        if (oz < 0) wm.rotation.y = Math.PI;
        bg.add(wm);
      });
      // Left and right
      [b.w/2+0.02, -b.w/2-0.02].forEach(ox => {
        const wm = new THREE.Mesh(new THREE.PlaneGeometry(b.d*0.72, 0.7), matWin);
        wm.position.set(ox, wy, 0);
        wm.rotation.y = ox > 0 ? Math.PI/2 : -Math.PI/2;
        bg.add(wm);
      });
    }

    // Height label
    const hLbl = textLabel(b.h+'m', 3, 0.8);
    hLbl.position.set(0, b.h + 1.5, 0);

    // Dimension annotation: vertical height line

    hAnnoLbl.position.set(b.w/2+2.5, b.h/2, b.d/2+1);
    bg.add(hAnnoLbl);

    // Dimension annotation: horizontal width line
    const wPts = [new THREE.Vector3(-b.w/2, 0.1, b.d/2+1.5), new THREE.Vector3(b.w/2, 0.1, b.d/2+1.5)];
    const wLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints(wPts), matAnno);
    bg.add(wLine);
    const wAnnoLbl = textLabel(b.w+'m', 2.5, 0.6);
    wAnnoLbl.rotation.x = -Math.PI/2;
    wAnnoLbl.position.set(0, 0.15, b.d/2+3);

function selectCustomBuilding(id) {
  // Reset previous
  if (selectedCustomId !== null && customBuildingMeshes[selectedCustomId]) {
    const prevGrp = customBuildingMeshes[selectedCustomId];
    prevGrp.traverse(c => { if (c.isMesh && c.material && c.material.emissive) c.material.emissive.setHex(0x000000); });
  }
  selectedCustomId = id;
  if (id !== null && customBuildingMeshes[id]) {
    const grp = customBuildingMeshes[id];
    grp.traverse(c => {
      if (c.isMesh && c.userData.buildingId === id && c.material && c.material.emissive) {
        c.material.emissive.setHex(0x224422);
      }
    });
  }
  updateBuildingUI();
  updateSpacingInfo();
}

const mouseDown = {x:0, y:0};
canvas.addEventListener('mousedown', function(e) {
  mouseDown.x = e.clientX; mouseDown.y = e.clientY;
});
canvas.addEventListener('mouseup', function(e) {
  if (currentPreset !== 'custom') return;
  const dx = e.clientX - mouseDown.x, dy = e.clientY - mouseDown.y;
  if (Math.abs(dx) > 5 || Math.abs(dy) > 5) return; // was a drag

  const rect = canvas.getBoundingClientRect();
  const mouse = new THREE.Vector2(
    ((e.clientX - rect.left) / rect.width) * 2 - 1,
    -((e.clientY - rect.top) / rect.height) * 2 + 1
  );
  raycaster.setFromCamera(mouse, camera);

  // Check building bodies first
  const bodyMeshes = [];
  Object.values(customBuildingMeshes).forEach(grp => {
    grp.traverse(c => { if (c.isMesh && c.userData.buildingId) bodyMeshes.push(c); });
  });
  const bHits = raycaster.intersectObjects(bodyMeshes);
  if (bHits.length > 0) {
    selectCustomBuilding(bHits[0].object.userData.buildingId);
    return;
  }

  // Check ground
  if (customGround) {
    const gHits = raycaster.intersectObject(customGround);

      const id = Date.now();

      setCustomBuildings(customBuildings);
      selectCustomBuilding(id);
    }
  }
});

// ── Sunlight analysis heatmap ──
function calcSunInline(hour, month, day, lat) {
  const N = dayOfYear(month, day);
  const dec = 23.45 * Math.sin(DEG * (360/365) * (284 + N));
  const ha = (hour - 12) * 15;
  const sinAlt = Math.sin(DEG*lat)*Math.sin(DEG*dec) + Math.cos(DEG*lat)*Math.cos(DEG*dec)*Math.cos(DEG*ha);
  const alt = Math.asin(Math.max(-1, Math.min(1, sinAlt))) / DEG;
  const cosAlt = Math.cos(DEG * alt);
  let az = 180;
  if (cosAlt > 0.0001) {
    const cosAzS = (Math.sin(DEG*dec) - Math.sin(DEG*lat)*sinAlt) / (Math.cos(DEG*lat)*cosAlt);
    const azFS = Math.acos(Math.max(-1, Math.min(1, cosAzS))) / DEG;
    az = ha > 0 ? 360 - azFS : azFS;
    az = ((az % 360) + 360) % 360;
  }
  return {alt:alt, az:az};
}

window.runSunlightAnalysis = function() {
  clearSunlightAnalysisInternal();
  analysisGroup = new THREE.Group();
  groupCustom.add(analysisGroup);

  const gridSize = 16;
  const cellSize = 160 / gridSize; // covers -80 to 80
  const repDays = [[1,15],[3,20],[6,21],[9,23]]; // 4 representative days
  const lat = currentCity.lat;

  // Collect body meshes for raycasting
  const bodyMeshes = [];
  Object.values(customBuildingMeshes).forEach(grp => {
    grp.traverse(c => { if (c.isMesh && c.userData.buildingId) bodyMeshes.push(c); });
  });

  const sunHours = new Float32Array(gridSize * gridSize);
  let maxHours = 0;

  for (let gi = 0; gi < gridSize; gi++) {
    for (let gj = 0; gj < gridSize; gj++) {
      const cx = -80 + (gi + 0.5) * cellSize;
      const cz = -80 + (gj + 0.5) * cellSize;
      let hours = 0;

      repDays.forEach(([m, d]) => {
        for (let h = 5; h <= 19; h += 0.5) {
          const sun = calcSunInline(h, m, d, lat);
          if (sun.alt <= 0) continue;
          const sd2 = sunDir(sun.az * DEG, sun.alt * DEG);
          const origin = new THREE.Vector3(cx, 0.5, cz);
          const dir = new THREE.Vector3(sd2.x, sd2.y, sd2.z).normalize();
          const rc = new THREE.Raycaster(origin, dir, 0, 300);
          const hits = rc.intersectObjects(bodyMeshes);
          if (hits.length === 0) hours += 0.5;
        }
      });

      hours /= repDays.length; // average
      sunHours[gi * gridSize + gj] = hours;
      if (hours > maxHours) maxHours = hours;
    }
  }

  // Create colored cells
  for (let gi = 0; gi < gridSize; gi++) {
    for (let gj = 0; gj < gridSize; gj++) {
      const cx = -80 + (gi + 0.5) * cellSize;
      const cz = -80 + (gj + 0.5) * cellSize;
      const hours = sunHours[gi * gridSize + gj];
      const t = maxHours > 0 ? hours / maxHours : 0;
      // Blue (0,0,1) -> Red (1,0,0)
      const color = new THREE.Color(t, 0, 1 - t);
      const mat = new THREE.MeshBasicMaterial({color:color, transparent:true, opacity:0.45, depthWrite:false});
      const cell = new THREE.Mesh(new THREE.PlaneGeometry(cellSize*0.9, cellSize*0.9), mat);
      cell.rotation.x = -Math.PI/2; cell.position.set(cx, 0.06, cz);
      analysisGroup.add(cell);

      // Hour label
      const lbl = textLabel(hours.toFixed(1)+'h', cellSize*0.7, cellSize*0.25);
      lbl.rotation.x = -Math.PI/2; lbl.position.set(cx, 0.07, cz);
      analysisGroup.add(lbl);
    }
  }

  const resultDiv = document.getElementById('analysis-result');
  resultDiv.style.display = 'block';
  resultDiv.textContent = '日照分析完成：平均 ' + (Array.from(sunHours).reduce((a,b)=>a+b,0) / (gridSize*gridSize)).toFixed(1) + ' 小時/天（紅=多日照，藍=少日照）';
};

function clearSunlightAnalysisInternal() {
  if (analysisGroup) {
    groupCustom.remove(analysisGroup);
    analysisGroup.traverse(c => { if (c.geometry) c.geometry.dispose(); if (c.material) c.material.dispose(); });
    analysisGroup = null;
  }
  const resultDiv = document.getElementById('analysis-result');
  if (resultDiv) { resultDiv.style.display = 'none'; resultDiv.textContent = ''; }
}
window.clearSunlightAnalysis = clearSunlightAnalysisInternal;

// ── Spacing calculator ──
function updateSpacingInfo() {
  const infoDiv = document.getElementById('spacing-info');
  // Remove old spacing line
  if (spacingLine) { groupCustom.remove(spacingLine); spacingLine = null; }
  if (selectedCustomId === null || currentPreset !== 'custom') {
    if (infoDiv) infoDiv.style.display = 'none';
    return;
  }
  const b = customBuildings.find(b => b.id === selectedCustomId);
  if (!b) { infoDiv.style.display = 'none'; return; }

  const lat = currentCity.lat;
  // Winter solstice noon sun altitude
  const winterSun = calcSunInline(12, 12, 21, lat);
  const alt = winterSun.alt;
  if (alt <= 0) {
    infoDiv.style.display = 'block';
    infoDiv.textContent = '冬至正午太陽高度角 ≤ 0°，無法計算間距';
    return;
  }
  const minSpacing = b.h / Math.tan(alt * DEG);
  infoDiv.style.display = 'block';
  infoDiv.textContent = '冬至正午高度角: ' + alt.toFixed(1) + '° | 最小間距: ' + minSpacing.toFixed(1) + 'm（建築高' + b.h + 'm）';

  // Draw spacing line in 3D (south of building)
  spacingLine = new THREE.Group();
  const lineMatB = new THREE.LineBasicMaterial({color:0x4488FF, transparent:true, opacity:0.8});
  const pts = [
    new THREE.Vector3(b.x, 0.2, b.z + b.d/2),
    new THREE.Vector3(b.x, 0.2, b.z + b.d/2 + minSpacing)
  ];
  const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), lineMatB);
  spacingLine.add(line);

  // Translucent zone
  const zoneGeo = new THREE.PlaneGeometry(b.w, minSpacing);
  const zoneMat = new THREE.MeshBasicMaterial({color:0x4488FF, transparent:true, opacity:0.12, depthWrite:false, side:THREE.DoubleSide});
  const zone = new THREE.Mesh(zoneGeo, zoneMat);
  zone.rotation.x = -Math.PI/2;
  zone.position.set(b.x, 0.1, b.z + b.d/2 + minSpacing/2);
  spacingLine.add(zone);

  // Label
  const lbl = textLabel(minSpacing.toFixed(1)+'m', 4, 1);
  lbl.rotation.x = -Math.PI/2;
  lbl.position.set(b.x, 0.2, b.z + b.d/2 + minSpacing/2);
  spacingLine.add(lbl);

  groupCustom.add(spacingLine);
}

let pathLine = null, shadowLine = null;
function buildSunPath(month, lat) {
  if (pathLine) { scene.remove(pathLine); pathLine.geometry.dispose(); }
  const pts=[], N=dayOfYear(month,15), dec=23.45*Math.sin(DEG*(360/365)*(284+N));

    const ha=(h-12)*15;
    const sinAlt=Math.sin(DEG*lat)*Math.sin(DEG*dec)+Math.cos(DEG*lat)*Math.cos(DEG*dec)*Math.cos(DEG*ha);
    const alt=Math.asin(Math.max(-1,Math.min(1,sinAlt)))/DEG;
    if(alt<=0) continue;
    const cosAlt=Math.cos(DEG*alt);
    const cosAzS=(Math.sin(DEG*dec)-Math.sin(DEG*lat)*sinAlt)/(Math.cos(DEG*lat)*Math.max(0.001,cosAlt));
    let az=Math.acos(Math.max(-1,Math.min(1,cosAzS)))/DEG;
    if(ha>0) az=360-az; az=((az%360)+360)%360;
    const sd=sunDir(az*DEG,alt*DEG);
    const pathR=currentPreset==='ntust'?150:(currentPreset==='custom'?60:38);
    pts.push(new THREE.Vector3(sd.x*pathR,sd.y*pathR,sd.z*pathR));
  }
  if(pts.length<2) return;
  pathLine=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({color:0xFFAA44,transparent:true,opacity:0.5}));
  scene.add(pathLine);
}
function updateShadowLine(azDeg, altDeg) {
  if(shadowLine){scene.remove(shadowLine);shadowLine.geometry.dispose();}
  if(altDeg<=0.5) return;
  const len=MAIN_H_REF/Math.tan(altDeg*DEG);
  const saz=(azDeg+180)*DEG;
  const pts=[new THREE.Vector3(0,0.05,0),new THREE.Vector3(Math.sin(saz)*len,0.05,-Math.cos(saz)*len)];
  shadowLine=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({color:0xFF6644,transparent:true,opacity:0.7}));
  scene.add(shadowLine);
}

// Sky
const cDay=new THREE.Color(0x87CEEB),cDawn=new THREE.Color(0xFF7040),
      cTwi=new THREE.Color(0x253050),cNight=new THREE.Color(0x0D1117);

function applyScene(azDeg, altDeg, month, lat) {
  const isIndoor = currentPreset === 'indoor';
  const sd=sunDir(azDeg*DEG,altDeg*DEG), dist=currentPreset==='ntust'?150:(currentPreset==='custom'?120:80);
  // NTUST 場景以校園中心為基準（TR西、圖書館東、RB中東偏南）
  const tgt = currentPreset === 'ntust' ? new THREE.Vector3(0,0,2) : new THREE.Vector3(0,0,0);
  // 室內：太陽方位是否在窗戶可視範圍內（夾角<90°即可照入）
  var windowFactor = 1;
  if (isIndoor && altDeg > 0) {
    var ORIENT_AZ = { south: 180, east: 90, west: 270, north: 0 };
    var winNormalAz = ORIENT_AZ[currentOrientation] !== undefined ? ORIENT_AZ[currentOrientation] : 180;
    var diff = Math.abs(azDeg - winNormalAz);
    if (diff > 180) diff = 360 - diff;
    windowFactor = diff >= 90 ? 0 : 1;
  }
  if(altDeg>0){
    sunLight.position.set(sd.x*dist+tgt.x, sd.y*dist, sd.z*dist+tgt.z);
    sunLight.target.position.copy(tgt); sunLight.target.updateMatrixWorld();
    var baseInt=isIndoor?1.5+Math.sin(altDeg*DEG)*2.5:0.5+Math.sin(altDeg*DEG)*2.2;
    sunLight.intensity=isIndoor?0.15+baseInt*windowFactor:baseInt;
    if(!isIndoor){
      var shadowSize=Math.max(60,Math.min(300,MAIN_H_REF/Math.max(0.05,Math.tan(altDeg*DEG))+30));
      if(currentPreset==='ntust') shadowSize=Math.max(shadowSize,200);
      sunLight.shadow.camera.left=-shadowSize;sunLight.shadow.camera.right=shadowSize;
      sunLight.shadow.camera.top=shadowSize;sunLight.shadow.camera.bottom=-shadowSize;
      sunLight.shadow.camera.updateProjectionMatrix();
    }
    sunLight.color.setHex(altDeg<20?0xFF9050:0xFFF5DC);
    sunMesh.visible=!isIndoor;
    if(!isIndoor){const sunR=currentPreset==='ntust'?120:(currentPreset==='custom'?80:43);sunMesh.position.set(sd.x*sunR,sd.y*sunR,sd.z*sunR);sunMesh.material.color.setHex(altDeg<15?0xFF7030:0xFFE055);}
  } else { sunLight.intensity=0; sunMesh.visible=false; }
  hemi.intensity=isIndoor?0.30:Math.max(0.05,0.08+Math.max(0,Math.sin(altDeg*DEG))*0.65);
  let sky;
  if(altDeg<=-5) sky=cNight.clone();
  else if(altDeg<=0) sky=cNight.clone().lerp(cTwi,(altDeg+5)/5);
  else if(altDeg<=12) sky=cTwi.clone().lerp(cDawn,altDeg/6).lerp(cDay,altDeg/12);
  else sky=cDay.clone();
  scene.background=null;
  skyMat.uniforms.topColor.value.copy(sky);
  skyMat.uniforms.bottomColor.value.copy(sky.clone().lerp(new THREE.Color(0xE8E0D0),0.5));
  scene.fog.density=isIndoor?0:(currentPreset==='ntust'||currentPreset==='custom'?0.002:0.007);
  scene.fog.color.copy(sky.clone().lerp(new THREE.Color(0xC8DCF0),0.5));
  if(!isIndoor){
    buildSunPath(month,lat); updateShadowLine(azDeg,altDeg);
  } else {
    if(pathLine){pathLine.visible=false;}
    if(shadowLine){scene.remove(shadowLine);shadowLine.geometry.dispose();shadowLine=null;}
  }
}

// Animate
(function loop(){ requestAnimationFrame(loop); renderer.render(scene,camera); })();
window.addEventListener('resize',()=>{
  renderer.setSize(window.innerWidth,window.innerHeight);
  camera.aspect=window.innerWidth/window.innerHeight; camera.updateProjectionMatrix();
});

// ════════════════════════════════════════════════════════
// 3. UI State
// ════════════════════════════════════════════════════════
let currentPreset = 'taipei101';
let currentCity = CITIES[0];
let currentOrientation = 'south';
let currentHour = 12;
let currentMonth = 6;
let currentDay = 15;

function compute() {
  const s = calcSun(currentHour, currentMonth, currentDay, currentCity.lat);
  applyScene(s.az, s.alt, currentMonth, currentCity.lat);
  updateHUD(s);
}

function updateHUD(s) {
  document.getElementById('info-alt').textContent = s.alt > 0 ? s.alt.toFixed(1) : '日落';
  document.getElementById('info-az').textContent  = s.alt > 0 ? s.az.toFixed(1)  : '—';
  document.getElementById('info-dir').textContent = s.alt > 0 ? s.dir : '';
  document.getElementById('info-riseset').textContent = fmt(s.sunrise) + ' / ' + fmt(s.sunset);

  if (currentPreset === 'indoor') {
    document.getElementById('shadow-lbl').textContent = '光線進深';
    var oAzMap = { south: 180, east: 90, west: 270, north: 0 };
    var wAz = oAzMap[currentOrientation] !== undefined ? oAzMap[currentOrientation] : 180;
    var aDiff = Math.abs(s.az - wAz); if (aDiff > 180) aDiff = 360 - aDiff;
    if (s.alt > 0.5 && aDiff < 90) {
      const depth = 2.7 / Math.tan(s.alt * DEG);
      document.getElementById('info-shadow').textContent = Math.min(depth, 6).toFixed(1);
    } else {
      document.getElementById('info-shadow').textContent = '0.0';
    }
  } else {
    document.getElementById('shadow-lbl').textContent = '陰影長度';
    if (s.alt > 0.5) {
      const len = MAIN_H_REF / Math.tan(s.alt * DEG);
      document.getElementById('info-shadow').textContent = len.toFixed(0);
    } else {
      document.getElementById('info-shadow').textContent = '—';
    }
  }
}

// Preset
window.setPreset = function(p) {
  currentPreset = p;
  group101.visible    = (p === 'taipei101');
  groupNTUST.visible  = (p === 'ntust');
  groupIndoor.visible = (p === 'indoor');
  groupCustom.visible = (p === 'custom');

  if (p === 'ntust') {
    MAIN_H_REF = 24; camRadius = 180; camTarget.set(-5,15,-36);
    camTheta = DEG*220; camPhi = DEG*55;
    sunLight.shadow.camera.left=-250;sunLight.shadow.camera.right=250;
    sunLight.shadow.camera.top=250;sunLight.shadow.camera.bottom=-250;
  } else if (p === 'indoor') {
    MAIN_H_REF = 3; camRadius = 10; camTarget.set(0,1.5,-1);
    camTheta = DEG*20; camPhi = DEG*68;
    sunLight.shadow.camera.left=-10;sunLight.shadow.camera.right=10;
    sunLight.shadow.camera.top=10;sunLight.shadow.camera.bottom=-10;
  } else if (p === 'custom') {
    MAIN_H_REF = 20; camRadius = 80; camTarget.set(0,8,0);
    camTheta = DEG*40; camPhi = DEG*55;
    sunLight.shadow.camera.left=-80;sunLight.shadow.camera.right=80;
    sunLight.shadow.camera.top=80;sunLight.shadow.camera.bottom=-80;
  } else {
    MAIN_H_REF = 38; camRadius = 65; camTarget.set(0,8,0);
    camTheta = DEG*40; camPhi = DEG*55;
    sunLight.shadow.camera.left=-90;sunLight.shadow.camera.right=90;
    sunLight.shadow.camera.top=90;sunLight.shadow.camera.bottom=-90;
  }
  sunLight.shadow.camera.updateProjectionMatrix();
  updateCamera();

  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + p).classList.add('active');
  document.getElementById('orient-section').style.display = (p === 'indoor') ? 'block' : 'none';
  document.getElementById('custom-section').style.display = (p === 'custom') ? 'block' : 'none';
  compute();
};

// Orientation
window.setOrientation = function(o) {
  currentOrientation = o;
  const map = { south:0, east:Math.PI/2, west:-Math.PI/2, north:Math.PI };
  groupIndoor.rotation.y = map[o] || 0;
  document.querySelectorAll('.orient-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('o-' + o).classList.add('active');
  compute();
};

// City
function buildCityRow() {
  const row = document.getElementById('city-row');
  CITIES.forEach(c => {
    const chip = document.createElement('button');
    chip.className = 'city-chip' + (c.key === currentCity.key ? ' active' : '');
    chip.id = 'city-' + c.key;
    const latStr = (c.lat >= 0 ? c.lat.toFixed(1)+'°N' : Math.abs(c.lat).toFixed(1)+'°S');
    chip.innerHTML = c.name + '<span class="city-lat"> ' + latStr + '</span>';
    chip.onclick = () => {
      currentCity = c;
      document.querySelectorAll('.city-chip').forEach(b=>b.classList.remove('active'));
      chip.classList.add('active');
      compute();
    };
    row.appendChild(chip);
  });
}

// Season
window.setSeason = function(m, d) {
  currentMonth = m; currentDay = d;
  document.getElementById('month-slider').value = m;
  document.getElementById('month-val').textContent = m + '月';
  compute();
};

// Sliders
window.onHourChange = function(v) {
  currentHour = parseFloat(v);
  document.getElementById('hour-val').textContent = fmt(currentHour);
  compute();
};
window.onMonthChange = function(v) {
  currentMonth = parseInt(v);
  const maxD = [0,31,28,31,30,31,30,31,31,30,31,30,31][currentMonth];
  if (currentDay > maxD) currentDay = maxD;
  document.getElementById('day-slider').max = maxD;
  document.getElementById('day-slider').value = currentDay;
  document.getElementById('day-val').textContent = currentDay + '日';
  document.getElementById('month-val').textContent = v + '月';
  compute();
};
window.onDayChange = function(v) {
  currentDay = parseInt(v);
  document.getElementById('day-val').textContent = v + '日';
  compute();
};

// Auto-play
let playInterval = null;
window.togglePlay = function() {
  const btn = document.getElementById('play-btn');
  if (playInterval) {
    clearInterval(playInterval);
    playInterval = null;
    btn.textContent = '▶';
    btn.classList.remove('active');
  } else {
    btn.textContent = '⏸';
    btn.classList.add('active');
    playInterval = setInterval(() => {
      currentHour += 0.25;
      if (currentHour > 19) currentHour = 5;
      document.getElementById('hour-slider').value = currentHour;
      document.getElementById('hour-val').textContent = fmt(currentHour);
      compute();
    }, 150);
  }
};

// Screenshot
window.screenshot = function() {
  renderer.render(scene, camera);
  const link = document.createElement('a');
  link.download = '光影建築_' + currentPreset + '_' + currentMonth + '月' + currentDay + '日_' + fmt(currentHour).replace(':','') + '.png';
  link.href = renderer.domElement.toDataURL('image/png');
  link.click();
};

// Panel toggle
let panelOpen = true;
window.togglePanel = function() {
  panelOpen = !panelOpen;
  document.getElementById('panel').classList.toggle('collapsed', !panelOpen);
  document.getElementById('toggle-btn').classList.toggle('collapsed', !panelOpen);
  document.getElementById('toggle-btn').textContent = panelOpen ? '✕' : '☰';
  document.getElementById('compass').classList.toggle('panel-collapsed', !panelOpen);
};

// ── Init ──────────────────────────────────────────────────
buildCityRow();
applyScene(155, 58, 6, 25.04);   // default: June noon, Taipei
updateHUD(calcSun(12, 6, 15, 25.04));

document.getElementById('loading').style.display = 'none';

})();
</script>
